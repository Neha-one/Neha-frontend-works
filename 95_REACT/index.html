<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>React-intro</title>
</head>
<style>
    .box {
        /* width: 55px; */
        height: 55px;
        background-color: red;
        margin: 12px;

    }
</style>

<body>
    <div class="box box1">box1</div>
    <div class="box box2">box2</div>
    <div class="box box3">box3</div>
    <div class="box box3">box4</div>
    <script>
        setTimeout(() => {
            document.querySelector('.box1').innerHTML = "neha "
        }, 1000);
        setTimeout(() => {
            document.querySelector('.box2').innerHTML = "kumari"
        }, 2000);
        setTimeout(() => {
            document.querySelector('.box3').innerHTML = "baranwal"
        }, 3000);
        setTimeout(() => {
            document.querySelector('.box4').innerHTML = "web developer"
        }, 4000);
    </script>
</body>

</html>
